# ============================================================
# RENDER.YAML — B2B Price Editor
# WowHub SRL
#
# Documentazione: https://render.com/docs/blueprint-spec
# ============================================================

services:
  - type: web
    name: b2b-price-editor
    runtime: node
    region: frankfurt          # EU West — vicino all'Italia, GDPR friendly
    plan: starter              # $7/mese — sufficiente per uso interno
    branch: main

    buildCommand: npm install && npm run build
    startCommand: npm run start

    # Health check — Render verifica che l'app risponda
    healthCheckPath: /

    # Variabili d'ambiente
    # I valori sensibili vanno inseriti manualmente nella dashboard Render
    # (non scrivere mai valori reali in questo file — è committato su git)
    envVars:
      - key: NODE_ENV
        value: production

      - key: SHOPIFY_API_VERSION
        value: 2026-01

      # ⚠️ Questi vanno inseriti manualmente su Render Dashboard → Environment
      - key: SHOPIFY_API_KEY
        sync: false            # sync: false = Render chiede il valore manualmente

      - key: SHOPIFY_API_SECRET
        sync: false

      - key: SHOPIFY_ACCESS_TOKEN
        sync: false

      - key: SHOP
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: SESSION_SECRET
        generateValue: true    # Render genera automaticamente una stringa random sicura
