# ============================================================
# RENDER.YAML — B2B Price Editor
# WowHub SRL — Piano gratuito
# ============================================================

services:
  - type: web
    name: b2b-price-editor
    runtime: node
    region: frankfurt
    plan: free
    branch: main

    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production

      - key: SHOPIFY_API_VERSION
        value: 2026-01

      # Inserire manualmente nella dashboard Render dopo il deploy
      - key: SHOPIFY_API_KEY
        sync: false

      - key: SHOPIFY_API_SECRET
        sync: false

      - key: SHOPIFY_APP_URL
        sync: false          # Inserisci l'URL Render dopo il primo deploy

      - key: SCOPES
        value: read_products,write_products,read_publications,write_publications

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: SESSION_SECRET
        generateValue: true  # Render genera stringa sicura automaticamente
