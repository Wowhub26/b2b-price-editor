name = "B2B Price Editor"
client_id = "YOUR_CLIENT_ID_HERE"
application_url = "https://b2b-price-editor.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "your-store.myshopify.com"
include_config_on_deploy = true

[access_scopes]
# Scope necessari per leggere/scrivere price list B2B
scopes = "read_products,write_products,read_publications,write_publications"

[auth]
redirect_urls = [
  "https://b2b-price-editor.onrender.com/auth/callback",
  "http://localhost:3000/auth/callback"
]

[webhooks]
api_version = "2026-01"

[pos]
embedded = false
